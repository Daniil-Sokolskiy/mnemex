name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build

      - name: Type-check
        run: pnpm -r exec tsc --noEmit

      - name: Validate shell scripts
        run: |
          bash -n install.sh
          bash -n apps/wiki-template/scripts/ingest-book.sh
          bash -n apps/wiki-template/scripts/setup-converters.sh

      - name: Guard against owner-identifier leaks
        run: |
          if grep -rniE "daniil|sokolskiy|/Users/[a-z]+/vault" \
               --include='*.ts' --include='*.js' --include='*.json' \
               --include='*.sh' --include='*.md' --include='*.yaml' \
               . | grep -v node_modules; then
            echo "::error::Owner identifiers found — sanitize before merge"
            exit 1
          fi
          echo "Clean."
